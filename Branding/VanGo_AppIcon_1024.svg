<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    VanGo App Icon — Option D (lowercase italic wordmark)
    1024×1024 master. iOS auto-downsamples to all required sizes.
    No transparency / no rounded corners — Apple applies the squircle mask.

    Composition:
      • Cream "canvas" background — paper-like, distinctive in a sea of
        saturated app-icon colors.
      • "vango" in Bodoni 72 Bold Italic, cobalt — literary, confident.
      • Sun-yellow brushstroke underline, slightly asymmetric so it
        reads as hand-drawn. Lighter highlight stroke on top suggests
        light catching wet paint.
  -->

  <!-- Cream background — fully opaque -->
  <rect width="1024" height="1024" fill="#FAF6E8"/>

  <!-- "vango" wordmark, lowercase italic Bodoni serif -->
  <text x="512" y="600"
        text-anchor="middle"
        font-family="'Bodoni 72', 'Bodoni 72 OS', Bodoni, Didot, 'Big Caslon', Georgia, serif"
        font-style="italic"
        font-weight="700"
        font-size="380"
        fill="#1E3A8A">vango</text>

  <!-- Sun-yellow brushstroke underline.
       The curve dips slightly lower on the left, suggesting a hand-drawn
       brush stroke that started with a touch more pressure. -->
  <path d="M 180 700 Q 360 686 520 696 Q 690 708 840 684"
        fill="none" stroke="#F5B82E" stroke-width="26"
        stroke-linecap="round" opacity="0.95"/>

  <!-- Highlight stroke — narrower, lighter yellow, slight offset -->
  <path d="M 230 698 Q 390 690 530 700 Q 660 710 790 692"
        fill="none" stroke="#FFD060" stroke-width="9"
        stroke-linecap="round" opacity="0.6"/>
</svg>
