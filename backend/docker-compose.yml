services:
  # MongoDB Database
  mongodb:
    image: mongo:8.0
    container_name: foodtruck-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: foodtruck-app
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - foodtruck-network

  # Backend API
  api:
    build: .
    container_name: foodtruck-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    # Compose reads variables from a sibling `.env` file automatically.
    # Copy `.env.example` to `.env` and fill in real secrets — never
    # commit `.env`. The `:?` suffix makes JWT secrets *required*: the
    # stack refuses to start if they are unset, preventing the old
    # placeholder defaults from ever shipping.
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/foodtruck-app}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    depends_on:
      - mongodb
    volumes:
      - ./src:/app/src
      - /app/node_modules
    networks:
      - foodtruck-network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  foodtruck-network:
    driver: bridge
